name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Lint, contract, and tests
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Verify generated Agent OpenAPI
        run: python scripts/generate_agent_openapi.py --check

      - name: Verify production image dependencies
        run: python -m automl_api.production

      - name: Run tests
        run: pytest -q

      - name: Verify release bundle inputs
        run: python scripts/package_release.py --no-archive
