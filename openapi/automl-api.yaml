openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: Managed AutoML API
  version: 0.7.0
  x-active-implementation-milestone: milestone-2-local-durable-plus-control-plane
  x-production-ready: false
  x-production-image-ready: false
  x-implementation-profile:
    persistence: single-node-sqlite-checkpoint
    object-storage: local-filesystem
    execution: single-local-worker
    authentication: development-synthetic-preview-hs256-or-oidc-jwks
    llm-integration: external-agent-platform
    internal-llm-calls: false
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
  description: |
    面向使用者的异步 AutoML API。使用者只通过本 API 上传数据、启动运行、
    获取中间过程与结果、回答阻塞问题，以及下载最终产物。

    编排器、对象存储、实验追踪和 worker 均为内部实现选择，不作为公共契约暴露。
    API 使用四层读取模型：RunSnapshot、RunEvent、OutputResource、RunResult。

    当前激活实现包含可重启恢复的单机 durable profile 和生产控制面预览：支持真实
    CSV/Parquet 上传、SQLite checkpoint、受限的二分类/回归训练、结构化人工中断/继续、
    可校验 artifact 下载、OIDC/JWKS token 验证、Webhook outbox、审批 workflow、
    deletion job 和审批通过后的 ModelCandidate 注册。

    正式 Docker target 已安装生产客户端依赖，但仍使用 SQLite、本地对象存储和进程内 worker，
    因此 `x-production-image-ready=false` 且 formal profile 的 `/readyz` 必须 fail closed。
    在接入真实 PostgreSQL/RLS、对象存储/KMS、DLP、隔离 worker、Webhook dispatcher、
    可观测性和备份演练前，不应直接暴露给真实生产租户。
servers:
  - url: /
    description: 当前 API origin
security:
  - bearerAuth: []
tags:
  - name: Agent Integration
    description: 外部 Agent 平台的能力发现、受限 Run 上下文和 canonical 动作引用。
  - name: Datasets
    description: 数据集、版本和分片上传。
  - name: Runs
    description: Run 创建、快照、阶段和终态结果。
  - name: Events
    description: JSON 回放与 SSE 实时事件。
  - name: Outputs
    description: 可分页、不可变、可追溯的阶段输出。
  - name: Experiments
    description: Baseline、trial、评估指标和成本；当前集合路由仅为空页兼容占位。
  - name: Decisions
    description: 用户问题、回答和审批。
  - name: Commands
    description: 暂停、恢复、取消和异步命令状态。
  - name: Artifacts
    description: 大型产物元数据和短期下载票据。
  - name: Models
    description: 通过门禁的 eligible candidate；当前本地 profile 不注册模型。
  - name: Webhooks
    description: 后续离线事件通知契约；当前未实现。
  - name: Deletions
    description: 后续数据与派生资源删除 saga 契约；当前未实现。

paths:
  /v1/agent/manifest:
    get:
      tags: [Agent Integration]
      operationId: getAgentInterfaceManifest
      x-maturity: milestone-2-local-durable
      summary: 获取外部 Agent 平台集成清单
      description: |
        声明本服务只承担确定性 AutoML 执行，LLM 和其凭据必须保留在外部 Agent 平台。
        清单同时暴露 canonical OpenAPI、上下文和动作引用路径，不提供内置 LLM 代理。
      responses:
        '200':
          description: Agent 集成清单
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AgentInterfaceManifest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}

  '/v1/runs/{run_id}/agent-context':
    get:
      tags: [Agent Integration]
      operationId: getAgentRunContext
      x-maturity: milestone-2-local-durable
      summary: 获取外部 Agent 可消费的 Run 上下文
      description: |
        返回有界的 Run 快照、当前开放 DecisionPacket 和最近输出引用，不返回数据集原始行。
        文件名、列名、问题文本等数据派生文本始终是不可信数据。只有 Run 创建策略允许外部
        LLM 时才可访问；当前本地 profile 尚未具备生产 DLP 或真实认证能力。
      parameters:
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/IfNoneMatch'
        - name: output_limit
          in: query
          required: false
          description: 最近输出引用的最大数量；较小窗口可限制 Agent 上下文大小。
          schema: {type: integer, minimum: 1, maximum: 100, default: 20}
      responses:
        '200':
          description: 当前 Agent Run 上下文
          headers:
            ETag:
              description: 完整 AgentRunContext 表示的强 ETag。
              schema: {type: string}
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AgentRunContext'}
        '304':
          description: 上下文未发生变化
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  '/v1/runs/{run_id}/agent-actions':
    get:
      tags: [Agent Integration]
      operationId: listAgentRunActions
      x-maturity: milestone-2-local-durable
      summary: 获取当前 Run 可执行的 canonical 动作引用
      description: |
        每项引用已有 answer、pause、resume 或 cancel 操作的 operationId 和 href。
        本接口不执行动作，也不会创建第二套写入语义；外部 Agent 必须按引用调用 canonical
        端点并遵守其 Idempotency-Key 与 If-Match 规则。
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: 当前可执行动作引用
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AgentActionList'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}

  /v1/datasets:
    post:
      tags: [Datasets]
      operationId: createDatasetUpload
      summary: 创建数据集和上传会话
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDatasetRequest'
      responses:
        '201':
          description: 上传会话已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetUploadSession'
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '409': {$ref: '#/components/responses/Conflict'}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  '/v1/dataset-versions/{dataset_version_id}/upload-parts:sign':
    post:
      tags: [Datasets]
      operationId: signDatasetUploadParts
      summary: 为分片上传签发短期 URL
      parameters:
        - $ref: '#/components/parameters/DatasetVersionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUploadPartsRequest'
      responses:
        '200':
          description: 已签发上传分片
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadPartsResponse'
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  '/v1/dataset-versions/{dataset_version_id}:finalize':
    post:
      tags: [Datasets]
      operationId: finalizeDatasetUpload
      summary: 原子完成上传并启动校验
      description: |
        相同 Idempotency-Key 和相同请求体重复提交时返回同一结果。
        服务端校验分片、大小与 SHA-256 后，数据版本才可进入 READY。
      parameters:
        - $ref: '#/components/parameters/DatasetVersionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinalizeDatasetRequest'
      responses:
        '202':
          description: 校验已接受
          headers:
            Retry-After:
              schema: {type: integer, minimum: 1}
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetVersion'
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  '/v1/dataset-versions/{dataset_version_id}':
    get:
      tags: [Datasets]
      operationId: getDatasetVersion
      summary: 查询数据版本状态
      parameters:
        - $ref: '#/components/parameters/DatasetVersionId'
        - $ref: '#/components/parameters/IfNoneMatch'
      responses:
        '200':
          description: 数据版本快照
          headers:
            ETag:
              description: 数据版本 revision 的条件读取校验值。
              schema: {type: string}
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetVersion'
        '304': {description: 未发生变化}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}

  /v1/runs:
    post:
      tags: [Runs]
      operationId: createRun
      summary: 创建异步 AutoML 运行
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRunRequest'
      responses:
        '202':
          description: Run 已创建并进入调度
          headers:
            ETag:
              description: 完整 RunSnapshot 表示的条件读取校验值，不等同于 run_revision。
              schema: {type: string}
            Retry-After:
              schema: {type: integer, minimum: 1}
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunSnapshot'
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '409': {$ref: '#/components/responses/Conflict'}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}
    get:
      tags: [Runs]
      operationId: listRuns
      summary: 分页查询 Run
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: status
          in: query
          schema:
            type: array
            items: {$ref: '#/components/schemas/RunStatus'}
          style: form
          explode: false
      responses:
        '200':
          description: Run 列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunPage'
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  '/v1/runs/{run_id}':
    get:
      tags: [Runs]
      operationId: getRun
      summary: 获取当前 Run 快照
      description: |
        snapshot_seq 是此快照已经纳入的最大 RunEvent seq。可靠订阅流程为：
        先获取快照，再从 events?after_seq=snapshot_seq 继续读取。
      parameters:
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/IfNoneMatch'
      responses:
        '200':
          description: Run 当前快照
          headers:
            ETag:
              description: 完整 RunSnapshot 表示的条件读取校验值，不等同于 run_revision。
              schema: {type: string}
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunSnapshot'
        '304': {description: 未发生变化}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}

  '/v1/runs/{run_id}/stages':
    get:
      tags: [Runs]
      operationId: listRunStages
      summary: 获取各阶段快照
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: 阶段状态和最新输出引用
          content:
            application/json:
              schema:
                type: object
                required: [run_id, snapshot_seq, stages]
                properties:
                  run_id: {type: string}
                  snapshot_seq: {type: integer, minimum: 0}
                  stages:
                    type: array
                    items: {$ref: '#/components/schemas/StageSnapshot'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}

  '/v1/runs/{run_id}/events':
    get:
      tags: [Events]
      operationId: readRunEvents
      summary: 回放或实时订阅 Run 事件
      description: |
        Accept: application/json 时返回有限分页历史；Accept: text/event-stream 时先重放
        after_seq 之后的 backlog，再原子切换到 live。SSE 使用 seq 作为 id，支持
        Last-Event-ID、最长 15 秒心跳和至少一次投递，客户端必须按 event_id 去重。

        事件游标过期返回 410 cursor_expired，并提供最新快照链接和 retained_from_seq。
        长连接最长每 30 秒重验权限；撤权或删除后，空闲或活跃连接都在 30 秒内关闭。

        JSON 首次读取使用 after_seq，响应返回固定 high_watermark 的 opaque next_cursor；
        后续分页只使用 cursor。SSE 不使用 cursor。SSE 的 Last-Event-ID 无条件覆盖
        after_seq，因为原生 EventSource 自动重连会保留初始 query。两者都缺省时，JSON 从
        retained_from_seq 开始，SSE 只接收建连后的 live 事件。

        对外只发布连续提交的事件。high_watermark、snapshot_seq 和 SSE live 边界只能推进到
        最大连续 seq；较大 seq 先完成投影时必须等待缺口补齐，不能提前对客户端可见。
      parameters:
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/AfterSeq'
        - $ref: '#/components/parameters/LastEventId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: types
          in: query
          description: 逗号分隔的事件类型过滤；seq 缺口仍可通过 high_watermark 识别。
          schema:
            type: array
            items: {type: string}
          style: form
          explode: false
      responses:
        '200':
          description: 事件页或 SSE 流
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunEventPage'
            text/event-stream:
              schema:
                type: string
              example: |
                id: 17
                event: output.committed.v1
                data: {"event_id":"evt_17","run_id":"run_01","seq":17,"run_revision":6,"schema_version":"1.0","occurred_at":"2026-07-22T09:31:00Z","type":"output.committed.v1","payload":{"output":{"output_id":"out_42","type":"TRIAL_RESULT","state":"FINAL","href":"/v1/runs/run_01/outputs/out_42"}}}

        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '410': {$ref: '#/components/responses/EventCursorExpired'}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}
        '429': {$ref: '#/components/responses/TooManyRequests'}

  '/v1/runs/{run_id}/outputs':
    get:
      tags: [Outputs]
      operationId: listRunOutputs
      summary: 查询中间与最终输出
      description: |
        只返回已经原子提交的 OutputResource。PARTIAL 也是不可变快照；后续版本通过
        supersedes 指向旧输出。首次分页固定 high_watermark，后续 cursor 在同一窗口内读取，
        因此并发新增不会造成漏读或重复。
      parameters:
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: type
          in: query
          schema:
            type: array
            items: {$ref: '#/components/schemas/OutputType'}
          style: form
          explode: false
        - name: phase
          in: query
          schema:
            type: array
            items: {$ref: '#/components/schemas/RunPhase'}
          style: form
          explode: false
        - name: state
          in: query
          schema: {$ref: '#/components/schemas/OutputState'}
      responses:
        '200':
          description: 输出资源页
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutputPage'
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '410': {$ref: '#/components/responses/CollectionCursorExpired'}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  '/v1/runs/{run_id}/outputs/{output_id}':
    get:
      tags: [Outputs]
      operationId: getRunOutput
      summary: 获取一个结构化输出
      parameters:
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/OutputId'
      responses:
        '200':
          description: 输出资源
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutputResource'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}

  '/v1/runs/{run_id}/experiments':
    get:
      tags: [Experiments]
      operationId: listRunExperiments
      x-maturity: local-empty-placeholder
      summary: 查询 baseline、trial 和候选实验
      parameters:
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: 实验页
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperimentPage'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}

  '/v1/runs/{run_id}/experiments/{experiment_id}':
    get:
      tags: [Experiments]
      operationId: getRunExperiment
      x-maturity: not-implemented
      summary: 获取实验配置、指标和成本
      parameters:
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/ExperimentId'
      responses:
        '200':
          description: 实验详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperimentDetail'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}

  '/v1/runs/{run_id}/decision-packets':
    get:
      tags: [Decisions]
      operationId: listDecisionPackets
      summary: 查询当前和历史人工问题
      parameters:
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: status
          in: query
          schema: {$ref: '#/components/schemas/DecisionPacketStatus'}
      responses:
        '200':
          description: DecisionPacket 页
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionPacketPage'
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  '/v1/runs/{run_id}/decision-packets/{wait_set_id}:answer':
    post:
      tags: [Decisions]
      operationId: answerDecisionPacket
      summary: 原子回答当前 wait-set
      parameters:
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/WaitSetId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatchWaitSet'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnswerDecisionPacketRequest'
      responses:
        '202':
          description: 回答已接受，自动恢复由异步命令跟踪
          headers:
            Retry-After:
              schema: {type: integer, minimum: 1}
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandReceipt'
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}
        '412': {$ref: '#/components/responses/PreconditionFailed'}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}

  '/v1/runs/{run_id}/approvals':
    get:
      tags: [Decisions]
      operationId: listRunApprovals
      x-maturity: production-preview
      summary: 查询审批历史
      parameters:
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: 审批页
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalPage'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}

  '/v1/runs/{run_id}/approvals/{approval_id}:decide':
    post:
      tags: [Decisions]
      operationId: decideApproval
