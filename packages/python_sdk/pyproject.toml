[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"

[project]
name = "automl-sdk"
version = "0.7.0"
description = "Synchronous Python SDK for the Managed AutoML HTTP API"
readme = "README.md"
license = {file = "LICENSE"}
requires-python = ">=3.11"
dependencies = [
  "httpx>=0.27,<1",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["automl_sdk*"]

[tool.setuptools.package-data]
automl_sdk = ["py.typed"]
